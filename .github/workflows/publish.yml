name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify package identity
        run: |
          node -e "const p=require('./package.json'); if (p.name !== '@dowonk-7949/llm-wiki-standard') { console.error('Unexpected package name:', p.name); process.exit(1); }"

      - name: Verify tag matches package version
        run: |
          node -e "const p=require('./package.json'); const tag=process.env.GITHUB_REF_NAME || ''; const version=tag.replace(/^v/, ''); if (tag === version || version !== p.version) { console.error('Tag ' + tag + ' does not match package version ' + p.version); process.exit(1); }"

      - name: Run tests
        run: node --test tests/*.test.js

      - name: Validate frontmatter
        run: node bin/llm-wiki.js validate-frontmatter

      - name: Run doctor
        run: node bin/llm-wiki.js doctor --format markdown

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
        # Trusted Publishing/OIDC is the default path for this workflow.
        # If a legacy token fallback is ever required, add NODE_AUTH_TOKEN
        # from a short-lived npm automation token in a separate reviewed change.

  # GitHub Release on the same v* tag push (GATE_REVIEW.md Gate 12). Runs only
  # after npm publish succeeds. Isolated to contents:write (job-level permissions
  # REPLACE the workflow-level id-token:write, so this job cannot mint an OIDC
  # token and the publish job cannot create releases). The body is generated by
  # the read-only `release-notes --body-only`, which scans the notes for
  # sensitive-looking values and exits non-zero (withholding the body) on a match.
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Generate release body from release notes
        run: |
          set -euo pipefail
          prev_tag="$(git describe --tags --abbrev=0 --match 'v*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$prev_tag" ]; then
            node bin/llm-wiki.js release-notes --body-only --since "$prev_tag" > release-body.md
          else
            node bin/llm-wiki.js release-notes --body-only > release-body.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-body.md --verify-tag
