name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: "Verify · Node ${{ matrix.node }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - "18.18.0"
          - "20"
          - "22"
          - "24"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Verify package identity
        run: |
          node -e "const p=require('./package.json'); if (p.name !== '@dowonk-7949/llm-wiki-standard') { console.error('Unexpected package name:', p.name); process.exit(1); }"

      - name: Run tests
        run: node --test tests/*.test.js

      - name: Validate frontmatter
        run: node bin/llm-wiki.js validate-frontmatter

      - name: Run doctor
        run: node bin/llm-wiki.js doctor --format markdown

      - name: Check package contents
        run: npm pack --dry-run

  consumer-install:
    name: "Consumer install · ${{ matrix.os }}"
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Pack, install, and smoke-test in a scratch consumer project
        run: |
          npm pack
          TARBALL="$(ls dowonk-7949-llm-wiki-standard-*.tgz | head -n 1)"
          echo "Packed tarball: $TARBALL"
          mkdir consumer
          cd consumer
          npm init -y > /dev/null
          npm install --no-save "../$TARBALL"
          npx --no-install llm-wiki doctor
