name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: "Verify · Node ${{ matrix.node }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - "18.18.0"
          - "20"
          - "22"
          - "24"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Verify package identity
        run: |
          node -e "const p=require('./package.json'); if (p.name !== 'llm-wiki-governance') { console.error('Unexpected package name:', p.name); process.exit(1); }"

      - name: Lint (zero-dependency syntax gate)
        run: node scripts/lint-syntax.mjs

      - name: Run tests
        run: node --test tests/*.test.js

      - name: Validate frontmatter
        run: node bin/llm-wiki.js validate-frontmatter

      - name: Run doctor
        run: node bin/llm-wiki.js doctor --format markdown

      - name: Check package contents
        run: npm pack --dry-run

  consumer-install:
    name: "Consumer install · ${{ matrix.os }}"
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Pack, install, and run Quick Start commands against the tarball
        run: |
          npm pack
          TARBALL="$(ls llm-wiki-governance-*.tgz | head -n 1)"
          echo "Packed tarball: $TARBALL"
          mkdir consumer
          cd consumer
          npm init -y > /dev/null
          npm install --no-save "../$TARBALL"
          npx --no-install llm-wiki doctor
          npx --no-install llm-wiki init --dry-run --type library
          npx --no-install llm-wiki validate-frontmatter

  coverage:
    name: "Coverage (informational, non-blocking) · Node 22"
    needs: verify
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      # Coverage via the Node built-in test runner (Node 20+), NOT nyc/c8 — this
      # keeps the zero-dependency / zero-devDependency stance. Reported for
      # visibility; non-blocking (continue-on-error) so it never gates CI.
      - name: Report test coverage
        run: node --test --experimental-test-coverage tests/*.test.js
